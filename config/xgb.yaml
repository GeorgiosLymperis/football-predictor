model_name: xgb

elo:
  k: 20
  home_advantage: 100
  form_matches: 5
  h2h_meetings: 8

xgb_params:
  objective: multi:softprob
  num_class: 3
  seed: 123
  max_depth: 3
  learning_rate: 0.0422
  n_estimators: 100
  subsample: 0.8
  colsample_bytree: 0.8
  gamma: 0.3

feature_variants:
  - base
  - base+form
  - base+h2h
  - base+form+h2h
  - base+momentum
  - base+form+momentum
  - base+shots
  - base+form+shots