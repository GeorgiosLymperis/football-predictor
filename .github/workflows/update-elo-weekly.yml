name: update-elo-weekly

# Cheap, frequent refresh: pull new match results and recompute current
# Elo/form/head-to-head/momentum state for already-promoted models,
# without refitting anything. The expensive full retrain (walk-forward
# backtest + refit) runs monthly instead (retrain-monthly.yml).

on:
  schedule:
    # 06:00 UTC every Monday.
    - cron: '0 6 * * 1'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-elo:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Refresh match data from football-data.co.uk
        run: python scripts/update_data.py

      - name: Run tests
        run: pytest tests/ -v

      - name: Refresh current Elo/form state for every league
        run: python scripts/update_elo_state.py

      - name: Commit and push updated data and Elo state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ models/
          if git diff --cached --quiet; then
            echo "No data or state changes to commit."
          else
            git commit -m "Weekly Elo/data refresh: $(date -u +%Y-%m-%d)"
            git pull --rebase
            git push
          fi
